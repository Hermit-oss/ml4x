behaviors:
  HexUnit:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024
      buffer_size: 20480
      learning_rate: 1.0e-4
      learning_rate_schedule: constant
      beta: 1.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      use_recurrent: false

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        encoding_size: 64
        learning_rate: 1.0e-3

    keep_checkpoints: 10
    checkpoint_interval: 50000
    max_steps: 10000000
    time_horizon: 512
    summary_freq: 2000
